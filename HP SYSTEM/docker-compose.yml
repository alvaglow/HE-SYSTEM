# ──────────────────────────────────────────────────────────────────────────────
# HP SYSTEM — Docker Compose Configuration
# Run the entire stack with: docker-compose up -d
# ──────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════════════════════ 
  # PostgreSQL Database
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: hed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hed_system_db
      POSTGRES_USER: hed_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./HP SYSTEM/backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hed_admin -d hed_system_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hed-network

  # ═══════════════════════════════════════════════════════════════════════════ 
  # Redis (Rate Limiting, Sessions, Cache)
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: hed-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - hed-network

  # ═══════════════════════════════════════════════════════════════════════════ 
  # Backend API
  # ═══════════════════════════════════════════════════════════════════════════
  backend:
    build:
      context: .
      dockerfile: HP System/backend/Dockerfile
    container_name: hed-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hed_system_db
      DB_USER: hed_admin
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_env}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Add other env vars from .env file
    env_file:
      - .env
    ports:
      - "4000: Globeed_visual error when discussing technical details or focusing on a user's request.
